<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="media/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="media/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="media/favicon-16x16.png">
    <title>🎯 Strel odpoveď | ELTEC Certifikačný systém</title>

    <!-- Zdieľané štýly -->
    <link rel="stylesheet" href="css/shared.css">

    <style>
        /* ===== Kvíz — stránkové štýly ===== */
        main { padding: 40px; }

        .container { max-width: 900px; }

        .quiz-setup { text-align: center; }
        .quiz-setup h2 { font-size: 2rem; margin-bottom: 30px; }

        select, input[type="number"] {
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-primary);
            width: 250px;
            cursor: pointer;
        }

        .btn-check {
            background: var(--warning);
        }
        .btn-check:hover { background: #ea580c; }

        /* Oblasť kvízu — skrytá kým nezačne */
        #quizPanel { display: none; }
        #resultPanel { display: none; }

        /* Karta otázky */
        .question-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .question-counter {
            background: var(--accent);
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .question-type {
            background: var(--surface);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: var(--surface);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--success);
            border-radius: 10px;
            transition: width 0.3s;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--text-primary);
        }

        /* Možnosti */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 20px;
            background: var(--surface);
            border-radius: 16px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option:hover          { border-color: var(--accent); background: var(--surface-light); }
        .option.selected       { border-color: var(--accent); background: rgba(59, 130, 246, 0.15); }
        .option.correct-highlight { border-color: var(--success); background: rgba(16, 185, 129, 0.15); }
        .option.wrong-highlight   { border-color: var(--danger);  background: rgba(239, 68, 68, 0.15); }

        .option-checkbox {
            width: 22px; height: 22px;
            border: 2px solid var(--border);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .option-checkbox.checked {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .option-letter {
            font-weight: 700;
            width: 34px; height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .option-text { flex: 1; }

        /* Spätná väzba */
        .feedback {
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid;
            animation: slideIn 0.3s ease;
        }

        .feedback.correct {
            border-left-color: var(--success);
            background: rgba(16, 185, 129, 0.1);
        }

        .feedback.wrong {
            border-left-color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .feedback-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .feedback.correct .feedback-title { color: var(--success); }
        .feedback.wrong   .feedback-title { color: var(--danger); }

        .correct-answer { margin-top: 8px; color: var(--success); }

        /* Navigácia kvízu */
        .quiz-nav {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        /* Výsledky */
        .final-score {
            font-size: 3rem;
            font-weight: 700;
            color: var(--success);
            margin: 20px 0;
            text-align: center;
        }

        .summary {
            text-align: left;
            max-height: 500px;
            overflow-y: auto;
            margin-top: 30px;
        }

        .summary-item {
            background: var(--surface);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 12px;
            border-left: 4px solid var(--danger);
        }

        .summary-item.correct { border-left-color: var(--success); }

        #resultPanel { text-align: center; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 700px) {
            main { padding: 24px 16px; }
            .question-text { font-size: 1.1rem; }
            .quiz-nav { flex-direction: column; }
            .quiz-nav .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="header-top">
                <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">🌙</button>
            </div>
            <h1 style="font-size:2.5rem;">🎯 Strel odpoveď!</h1>
            <p style="color:var(--text-secondary); margin-top:8px;">Vyber si test, označ odpovede a klikni na "Skontrolovať"</p>
            <nav class="nav-bar">
                <a href="index.html"            class="nav-link">🏠 Hlavná</a>
                <a href="spravne_odpovede.html" class="nav-link">📚 Správne odpovede</a>
                <a href="kviz.html"             class="nav-link">🎯 Kvíz</a>
                <a href="fejkhoot.html"         class="nav-link">🎮 FEJKHOOT</a>
            </nav>
        </header>

        <main>
            <!-- Nastavenie kvízu -->
            <div id="setupPanel" class="quiz-setup">
                <h2>🎯 Výber kvízu</h2>
                <div class="form-group">
                    <label>📘 Vyber test:</label>
                    <select id="testSelect">
                        <option value="A">Test A — Elektrotechnické merania</option>
                        <option value="B">Test B — Ochranné opatrenia</option>
                        <option value="C">Test C — Bezpečnosť práce</option>
                        <option value="D">Test D — Prvá pomoc</option>
                        <option value="LEG">Legislatíva</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🔢 Počet otázok:</label>
                    <input type="number" id="questionCount" min="1" max="50" value="10">
                </div>
                <button class="btn" id="startQuizBtn">🚀 Spustiť kvíz</button>
            </div>

            <!-- Oblasť kvízu -->
            <div id="quizPanel">
                <div id="questionContainer"></div>
                <div class="quiz-nav">
                    <button class="btn" id="prevBtn" style="background:var(--surface);">◀ Predchádzajúca</button>
                    <button class="btn btn-check" id="checkBtn">✅ Skontrolovať odpoveď</button>
                    <button class="btn" id="nextBtn">Ďalšia ▶</button>
                    <button class="btn btn-success" id="submitBtn" style="display:none;">🏁 Ukončiť kvíz</button>
                </div>
            </div>

            <!-- Výsledky -->
            <div id="resultPanel"></div>
        </main>

        <footer>
            <p style="margin-bottom:15px;">© 2026 ELTEC Certifikačný systém — Džanči</p>
            <p>⚙️ Posledný update: 22.4.2026 - 18:40</p>
        </footer>
    </div>

    <script src="js/questions.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/kviz.js"></script>

</body>
</html>
